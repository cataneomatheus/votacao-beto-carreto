<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#7c3aed" />
  <title>Quem vai ao Beto Carrero? 🎢</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ceu" aria-hidden="true">
    <span class="brinquedo r1">🎡</span>
    <span class="brinquedo r2">🎢</span>
    <span class="brinquedo r3">🎠</span>
    <span class="brinquedo r4">🎪</span>
    <span class="brinquedo r5">🎈</span>
  </div>

  <header>
    <h1>Quem vai ao <span class="destaque">Beto Carrero</span>? 🎢</h1>
    <p class="subtitulo">Bora marcar presença! Adicione seu nome e o tipo de ingresso 🎉</p>
  </header>

  <main>
    <!-- Painel de contadores por tipo -->
    <section class="placar" aria-label="Resumo por tipo de ingresso">
      <div class="stat stat-total">
        <span class="stat-icone">👨‍👩‍👧‍👦</span>
        <span class="stat-num" id="contTotal">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat stat-adulto">
        <span class="stat-icone">🎟️</span>
        <span class="stat-num" id="contAdulto">0</span>
        <span class="stat-label">Adultos</span>
      </div>
      <div class="stat stat-estudante">
        <span class="stat-icone">🎓</span>
        <span class="stat-num" id="contEstudante">0</span>
        <span class="stat-label">Estudantes</span>
      </div>
      <div class="stat stat-pcd">
        <span class="stat-icone">♿</span>
        <span class="stat-num" id="contPcd">0</span>
        <span class="stat-label">PCD</span>
      </div>
    </section>

    <section class="card form-card">
      <button id="btnAbrir" class="btn-add" type="button">➕ Adicionar pessoa</button>

      <form id="form" class="form" hidden>
        <label class="campo">
          <span class="campo-titulo">Nome</span>
          <input id="nome" name="nome" type="text" maxlength="80" placeholder="Ex: Tia Maria" required />
        </label>

        <fieldset class="tipo-grupo">
          <legend>Tipo de ingresso</legend>
          <div class="tipo-opcoes">
            <label class="tipo-opcao">
              <input type="radio" name="tipo" value="adulto" checked />
              <span>🎟️ Adulto</span>
            </label>
            <label class="tipo-opcao">
              <input type="radio" name="tipo" value="estudante" />
              <span>🎓 Estudante</span>
            </label>
            <label class="tipo-opcao">
              <input type="radio" name="tipo" value="pcd" />
              <span>♿ PCD</span>
            </label>
          </div>
        </fieldset>

        <div class="form-acoes">
          <button type="submit" class="btn-primario">✨ Adicionar</button>
          <button type="button" id="btnCancelar" class="btn-secundario">Cancelar</button>
        </div>
        <p id="erro" class="erro" hidden></p>
      </form>
    </section>

    <section class="card">
      <div class="lista-cabecalho">
        <h2>🎫 Confirmados</h2>
        <span id="contador" class="contador">0</span>
      </div>
      <div id="carregando" class="carregando">
        <span class="spinner" aria-hidden="true"></span>
        <span>Carregando a lista…</span>
      </div>
      <ul id="lista" class="lista"></ul>
      <p id="vazio" class="vazio" hidden>Ninguém na lista ainda. Seja o primeiro! 🎉</p>
    </section>
  </main>

  <!-- Modal de confirmação (customizado, no lugar do confirm() do navegador) -->
  <div id="modal" class="modal-overlay" hidden>
    <div class="modal" role="alertdialog" aria-modal="true" aria-labelledby="modal-titulo">
      <div class="modal-icone">🗑️</div>
      <h3 id="modal-titulo" class="modal-titulo">Remover pessoa?</h3>
      <p id="modal-texto" class="modal-texto"></p>
      <div class="modal-acoes">
        <button type="button" id="modal-cancelar" class="btn-secundario">Cancelar</button>
        <button type="button" id="modal-confirmar" class="btn-perigo">Remover</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
