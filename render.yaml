# Deploy no Render (plano free). A persistência fica no Turso (SQLite na nuvem),
# então NÃO precisamos de disco no Render.
# Passo a passo: crie o repo no GitHub, entre em render.com, "New +" ->
# "Blueprint" e aponte para este repositório. Depois preencha as variáveis
# TURSO_DATABASE_URL e TURSO_AUTH_TOKEN no painel (valores do painel do Turso).
services:
  - type: web
    name: votacao-beto-carrero
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
